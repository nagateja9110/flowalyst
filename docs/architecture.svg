<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="960" height="560" rx="12" fill="#f8fafc"/>

  <!-- ====== CLIENT ====== -->
  <rect x="30" y="120" width="220" height="320" rx="10" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="140" y="150" text-anchor="middle" font-size="16" font-weight="bold" fill="#3730a3">Client</text>
  <text x="140" y="170" text-anchor="middle" font-size="11" fill="#6366f1">React + Vite + Tailwind</text>

  <rect x="50" y="190" width="180" height="40" rx="6" fill="#ffffff" stroke="#c7d2fe"/>
  <text x="140" y="214" text-anchor="middle" font-size="12" fill="#334155">Upload CSV</text>

  <rect x="50" y="242" width="180" height="52" rx="6" fill="#ffffff" stroke="#c7d2fe"/>
  <text x="140" y="263" text-anchor="middle" font-size="12" fill="#334155">Chat — plain English</text>
  <text x="140" y="281" text-anchor="middle" font-size="11" fill="#64748b">"avg screen time by platform?"</text>

  <rect x="50" y="306" width="180" height="52" rx="6" fill="#ffffff" stroke="#c7d2fe"/>
  <text x="140" y="327" text-anchor="middle" font-size="12" fill="#334155">Live agent trace</text>
  <text x="140" y="345" text-anchor="middle" font-size="11" fill="#64748b">every SQL attempt, streamed</text>

  <rect x="50" y="370" width="180" height="52" rx="6" fill="#ffffff" stroke="#c7d2fe"/>
  <text x="140" y="391" text-anchor="middle" font-size="12" fill="#334155">Answer + table + chart</text>
  <text x="140" y="409" text-anchor="middle" font-size="11" fill="#64748b">Recharts auto-visualization</text>

  <!-- ====== SERVER ====== -->
  <rect x="330" y="60" width="330" height="440" rx="10" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/>
  <text x="495" y="90" text-anchor="middle" font-size="16" font-weight="bold" fill="#166534">Server</text>
  <text x="495" y="110" text-anchor="middle" font-size="11" fill="#16a34a">Node 20 + Express + TypeScript</text>

  <!-- agent loop -->
  <rect x="350" y="130" width="290" height="120" rx="8" fill="#ffffff" stroke="#86efac"/>
  <text x="495" y="153" text-anchor="middle" font-size="13" font-weight="bold" fill="#166534">Agent loop (max 6 iterations)</text>
  <text x="495" y="175" text-anchor="middle" font-size="11" fill="#475569">model writes SQL → server executes →</text>
  <text x="495" y="192" text-anchor="middle" font-size="11" fill="#475569">result or error fed back as tool_result →</text>
  <text x="495" y="209" text-anchor="middle" font-size="11" fill="#475569">model self-corrects until final answer</text>
  <text x="495" y="233" text-anchor="middle" font-size="11" fill="#16a34a">schema prompt-cached per workspace</text>

  <!-- guardrails -->
  <rect x="350" y="270" width="290" height="120" rx="8" fill="#fff7ed" stroke="#fb923c"/>
  <text x="495" y="293" text-anchor="middle" font-size="13" font-weight="bold" fill="#9a3412">Guardrails — SQL is untrusted</text>
  <text x="495" y="315" text-anchor="middle" font-size="11" fill="#475569">single SELECT / WITH only · no multi-statement</text>
  <text x="495" y="332" text-anchor="middle" font-size="11" fill="#475569">comments stripped · forbidden-keyword check</text>
  <text x="495" y="349" text-anchor="middle" font-size="11" fill="#475569">forced LIMIT 1000 wrap · 10s query timeout</text>
  <text x="495" y="371" text-anchor="middle" font-size="11" fill="#9a3412">fail closed: reject anything suspicious</text>

  <!-- duckdb -->
  <rect x="350" y="410" width="290" height="72" rx="8" fill="#fefce8" stroke="#eab308"/>
  <text x="495" y="433" text-anchor="middle" font-size="13" font-weight="bold" fill="#854d0e">DuckDB — embedded, in-memory</text>
  <text x="495" y="452" text-anchor="middle" font-size="11" fill="#475569">fresh instance per request · read-only views</text>
  <text x="495" y="469" text-anchor="middle" font-size="11" fill="#475569">read_csv_auto over uploaded CSVs · JOINs OK</text>

  <!-- ====== LLM PROVIDERS ====== -->
  <rect x="730" y="120" width="200" height="200" rx="10" fill="#fdf2f8" stroke="#ec4899" stroke-width="1.5"/>
  <text x="830" y="150" text-anchor="middle" font-size="16" font-weight="bold" fill="#9d174d">LLM provider</text>
  <rect x="750" y="170" width="160" height="44" rx="6" fill="#ffffff" stroke="#fbcfe8"/>
  <text x="830" y="188" text-anchor="middle" font-size="12" fill="#334155">Claude (tool use)</text>
  <text x="830" y="204" text-anchor="middle" font-size="10" fill="#64748b">strongest SQL reasoning</text>
  <rect x="750" y="222" width="160" height="44" rx="6" fill="#ffffff" stroke="#fbcfe8"/>
  <text x="830" y="240" text-anchor="middle" font-size="12" fill="#334155">Gemini (free tier)</text>
  <text x="830" y="256" text-anchor="middle" font-size="10" fill="#64748b">zero-cost path</text>
  <text x="830" y="290" text-anchor="middle" font-size="11" fill="#9d174d">API-key pool: round-robin,</text>
  <text x="830" y="306" text-anchor="middle" font-size="11" fill="#9d174d">60s bench on 429, auto failover</text>

  <!-- ====== EVAL ====== -->
  <rect x="730" y="380" width="200" height="100" rx="10" fill="#f1f5f9" stroke="#64748b" stroke-width="1.5"/>
  <text x="830" y="408" text-anchor="middle" font-size="14" font-weight="bold" fill="#334155">Eval harness</text>
  <text x="830" y="430" text-anchor="middle" font-size="11" fill="#475569">golden questions + expected</text>
  <text x="830" y="446" text-anchor="middle" font-size="11" fill="#475569">answers → accuracy, latency,</text>
  <text x="830" y="462" text-anchor="middle" font-size="11" fill="#475569">SQL calls per question</text>

  <!-- ====== ARROWS ====== -->
  <!-- client -> server -->
  <line x1="250" y1="210" x2="330" y2="185" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="286" y="180" text-anchor="middle" font-size="10" fill="#64748b">POST /api/ask</text>

  <!-- server -> client SSE -->
  <line x1="330" y1="360" x2="250" y2="385" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="288" y="392" text-anchor="middle" font-size="10" fill="#64748b">SSE stream</text>

  <!-- agent <-> llm -->
  <line x1="640" y1="175" x2="730" y2="185" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="730" y1="215" x2="640" y2="205" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="685" y="163" text-anchor="middle" font-size="10" fill="#64748b">question + schema</text>
  <text x="685" y="232" text-anchor="middle" font-size="10" fill="#64748b">SQL tool calls</text>

  <!-- agent -> guardrails -> duckdb -->
  <line x1="495" y1="250" x2="495" y2="270" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="495" y1="390" x2="495" y2="410" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- duckdb result back up (curved, right side) -->
  <path d="M 648 446 C 700 446 700 200 648 195" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <text x="712" y="330" text-anchor="middle" font-size="10" fill="#64748b">rows / error</text>

  <!-- title -->
  <text x="480" y="34" text-anchor="middle" font-size="19" font-weight="bold" fill="#0f172a">Flowalyst — plain-English questions, SQL-grounded answers</text>
</svg>
