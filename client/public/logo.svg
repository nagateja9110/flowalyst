<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Flowalyst logo">
  <defs>
    <linearGradient id="fa-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#34d399"/>
      <stop offset="1" stop-color="#059669"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="8" fill="url(#fa-bg)"/>
  <!-- ascending data bars -->
  <g fill="#ffffff" fill-opacity="0.9">
    <rect x="6.5"  y="18" width="4" height="7.5"  rx="1.4"/>
    <rect x="14"   y="14" width="4" height="11.5" rx="1.4"/>
    <rect x="21.5" y="9.5" width="4" height="16"  rx="1.4"/>
  </g>
  <!-- flow / trend line through the bars, ending in an insight spark -->
  <polyline points="8.5,16 16,12 23.5,7.5" fill="none" stroke="#ffffff" stroke-width="1.8"
            stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="23.5" cy="7.5" r="2.4" fill="#ffffff"/>
  <circle cx="23.5" cy="7.5" r="1.1" fill="#059669"/>
</svg>
